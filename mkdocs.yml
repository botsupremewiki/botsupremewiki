site_name: Bot Suprême Wiki
site_description: Le guide complet du RPG Discord — classes, combat, équipements, métiers et plus.
site_url: https://botsupremewiki.netlify.app
site_author: Bot Suprême

theme:
  name: material
  custom_dir: overrides
  language: fr
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.tooltips
  font:
    text: Roboto
    code: JetBrains Mono
  icon:
    logo: material/sword-cross
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/enemy_calc.js
  - javascripts/stat_calc.js
  - javascripts/craft_calc.js
  - javascripts/equip_calc.js

nav:
  - Accueil: index.md
  - Guide du Débutant: debutant.md
  - Classes:
      - Classes & Sorts: classes/index.md
      - Calculateur de Stats: classes/calculateur.md
      - Prestige: prestige.md
  - Métiers:
      - Vue d'ensemble: metiers/index.md
      - Récolte: metiers/recolte.md
      - Artisanat: metiers/artisanat.md
      - Conception: metiers/conception.md
  - Objets:
      - Matériaux: objets/materiaux.md
      - Équipements & Panoplies: objets/equipements.md
      - Potions & Élixirs: objets/potions.md
      - Nourritures: objets/nourriture.md
      - Runes: objets/runes.md
      - Reliques: objets/reliques.md
  - Modes de Jeu:
      - Vue d'ensemble: modes/index.md
      - Monde: modes/monde.md
      - Donjons: modes/donjons.md
      - Raids: modes/raids.md
      - World Boss: modes/world_boss.md
      - Taverne (PvP): modes/pvp.md
  - Titres & Quêtes:
      - Titres: titres.md
      - Quêtes: quetes.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
